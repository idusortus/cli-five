name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version with conflict detection
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          npm version patch --no-git-tag-version
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$PKG_NAME@$LOCAL_VERSION" version 2>/dev/null || echo "")
          ATTEMPTS=0
          MAX_ATTEMPTS=10
          while [ -n "$PUBLISHED" ]; do
            ATTEMPTS=$((ATTEMPTS + 1))
            if [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; then
              echo "Error: could not find an unpublished version after $MAX_ATTEMPTS bumps."
              exit 1
            fi
            echo "Version $LOCAL_VERSION already published on npm — bumping again (attempt $ATTEMPTS)..."
            npm version patch --no-git-tag-version
            LOCAL_VERSION=$(node -p "require('./package.json').version")
            PUBLISHED=$(npm view "$PKG_NAME@$LOCAL_VERSION" version 2>/dev/null || echo "")
          done
          echo "Will publish version: $LOCAL_VERSION"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and push version bump
        run: |
          git add package.json package-lock.json
          git diff --cached --quiet || git commit -m "chore: bump patch version [skip ci]"
          git push
